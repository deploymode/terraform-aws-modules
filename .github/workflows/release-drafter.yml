name: Release Drafter

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[no-release]') }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
